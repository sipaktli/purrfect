# purrfect

#=====================================================================
# Here you can select what scripts to run and when. Even add your own!
# Syntax: command:<name>=<script> and time:<name>=<spec>
#
# +30m   → every 30 minutes
# +1h    → every hour
# 03:00  → daily at 03:00

# Backups.
command:p_backup=p_backup.sh
time:pb=+168h

# Updates.
command:p_update=p_update.sh
time:p_update=+1h

# Security.
command:p_security=p_security.sh
time:p_security=+1h

# Cleanup and tunning.
command:p_cleanup=p_cleanup.sh
time:pc=23:30

# Reporting
command:p_report=p_report.sh
time:pci=23:30

#=====================================================================
# Here you can configure variables to be read by the scripts.
# variable_without_spaces="value in quotes"

# Backups 
sources=("/home/user1" "/home/user2")
compression_type="zstdmt"
compression_params="-10 -q -r -T0 -q --check --exclude-compressed --rsyncable --adapt"
checksum="sha256sum"
destination="/var/backups/"

