#=====================================================================

# Security
sec_lynis="yes"
sec_lynis_params="lynis update check ; lynis audit system --logfile logs/lynis.log"
sec_trivy="yes"
sec_trivy_params="-q --output logs/trivy.json fs /"
sec_osquery="no"
sec_osquery_params="--json "SELECT pr.name, p.port, p.address FROM listen_ports p JOIN processes pr USING (pid);" >> logs/osquery.log 2>&1"
sec_clamscan="no"
sec_clamscan_params="--log=logs/clamscan.log --cross-fs yes --follow-file-symlinks 2 --follow-dir-symlinks 2 --heuristic-alerts yes --heuristic-scan-precedence no --scan-elf yes --scan-html yes -i  -r /"
sec_wazuh="no"
sec_wazuh_params="grep -E "wazuh-modulesd:syscollector|wazuh-syscheckd" /var/ossec/logs/ossec.log | tail -n 50 >> logs/wazuh.log 2>&1"
sec_net_audit="yes"
sec_ossec="yes"
sec_openvas="no"
sec_openvas_params="socket --xml "<get_reports style='brief'/>" >> /var/log/openvas.log 2>&1"

#=====================================================================

# System cleanup and tuning
pc_fs="xfs"
pc_fs_optimize="yes"
pc_clear_broken="yes"
pc_clear_swap="yes" # Careful
pc_clear_ram="yes"
pc_docker_prune="no"
pc_bleachbit="yes"
pc_bleachbit_params="-c firefox.cache firefox.crash_reports firefox.vacuum librewolf.cache librewolf.crash_reports librewolf.vacuum thunderbird.cache vivaldi.crash_reports thunderbird.vacuum winetricks.temporary_files kde.cache"
pc_vacuum_journald="yes"
pc_vacuum_journald_params="--vacuum-time=1d"

#=====================================================================

# Reporting
# to do
reporting_email="yes"
reporting_email_addresses=("user1@example.com" "user2@example.com")
